spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ec_db

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Tokyo
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  redis:
    host: localhost
    port: 6379
  session:
    store-type: redis
    timeout: 1800s

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080
  servlet:
    session:
      cookie:
        name: SESSION
        http-only: true
        secure: true
        same-site: Lax
