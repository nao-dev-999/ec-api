spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ec_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Tokyo
    open-in-view: false       # OSIV „ĀĮśėéÁ§ļÁöĄ„Āę false śé®Ś•®

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  redis:
    host: localhost
    port: 6379
  session:
    store-type: redis
    timeout: 1800s

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080
  servlet:
    session:
      cookie:
        name: SESSION
        http-only: true
        secure: false # „É≠„Éľ„āę„ÉęÁíįŚĘÉ„Āģ„ĀŅfalse
        same-site: Lax  # Ť¶ĀšĽ∂„Āę„āą„āä Strict/None

logging:
  level:
    root: off
    com.example: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG
    org.springframework.session: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html      # „āĘ„āĮ„āĽ„āĻURL
    tags-sorter: alpha           # „āŅ„āį„āí„āĘ„Éę„Éē„ā°„Éô„ÉÉ„Éąť†Ü„Āęšł¶„ĀĻ„āč
    operations-sorter: method    # GET‚ÜíPOST‚ÜíPUT‚ÜíDELETEť†Ü„Āęšł¶„ĀĻ„āč
  api-docs:
    path: /v3/api-docs