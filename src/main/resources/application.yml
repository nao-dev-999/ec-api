spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ec_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Tokyo
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  redis:
    host: localhost
    port: 6379
  session:
    store-type: redis
    timeout: 1800s

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080
  servlet:
    session:
      cookie:
        name: SESSION
        http-only: true
        secure: true
        same-site: Lax  # 要件により Strict/None

logging:
  level:
    root: off
    com.example: INFO # DEBUG から INFO に変更
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # バインドパラメータをログ出力

springdoc:
  swagger-ui:
    path: /swagger-ui.html      # アクセスURL
    tags-sorter: alpha           # タグをアルファベット順に並べる
    operations-sorter: method    # GET→POST→PUT→DELETE順に並べる
  api-docs:
    path: /v3/api-docs