spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ec_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Tokyo
    open-in-view: false       # OSIV は明示的に false 推奨

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080

# JWT 設定
jwt:
  secret: "your-256-bit-secret-key-please-change-in-production-env"
  access-token-expiry-minutes: 30
  refresh-token-expiry-days: 7

logging:
  level:
    root: off
    com.example: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # バインドパラメータをログ出力
